name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest mypy
      - name: Run backend tests
        run: pytest -q tests/test_oauth_hmac.py tests/test_webhook_hmac.py tests/test_uninstall_webhook_cleanup.py tests/test_health.py
      - name: Type check core backend
        run: mypy app jobs

  widget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install and build storefront widget
        working-directory: apps/shopify-widget
        run: |
          npm ci
          npm run build
