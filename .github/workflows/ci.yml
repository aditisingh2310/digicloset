name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run backend tests
        run: |
          pytest -q tests/test_oauth_hmac.py tests/test_webhook_hmac.py tests/test_uninstall_webhook_cleanup.py tests/test_health.py
      - name: Compile backend modules
        run: |
          python -m py_compile app/main.py app/api/ai_infer.py app/api/billing.py app/api/oauth.py app/api/router.py app/api/shopify_routes.py app/core/exceptions.py app/core/tenant.py app/services/billing_service.py app/services/shopify_client.py app/services/shopify_service.py jobs/ai_tasks.py

  widget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install and build storefront widget
        working-directory: apps/shopify-widget
        run: |
          npm install
          npm run build


  node-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/shopify-app
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Lightweight app boot check
        env:
          SHOPIFY_SCOPES: read_products
          SHOPIFY_APP_URL: http://localhost
          SHOPIFY_API_KEY: dummy
          SHOPIFY_API_SECRET: dummy
        run: timeout 10s node -e "import('./index.js')" || test $? -eq 124
