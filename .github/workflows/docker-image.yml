name: Docker Image CI

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main", "feature/**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: shopify-backend
            context: ./apps/shopify-app/backend
            dockerfile: ./apps/shopify-app/backend/Dockerfile
          - name: inference-service
            context: ./services/inference-service
            dockerfile: ./services/inference-service/Dockerfile
          - name: ai-service
            context: ./services/ai-service
            dockerfile: ./services/ai-service/Dockerfile
          - name: queue-worker
            context: ./services/queue-worker
            dockerfile: ./services/queue-worker/Dockerfile

    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (${{ matrix.name }})
        if: hashFiles(format('{0}', matrix.dockerfile)) != ''
        run: |
          docker build \
            "${{ matrix.context }}" \
            --file "${{ matrix.dockerfile }}" \
            --tag "${{ matrix.name }}:${{ github.sha }}"

      - name: Run E2E Tests (Backend Only)
        if: matrix.name == 'shopify-backend' && hashFiles(format('{0}', matrix.dockerfile)) != ''
        run: |
          chmod +x run_tests.sh
          ./run_tests.sh "${{ matrix.name }}:${{ github.sha }}"
