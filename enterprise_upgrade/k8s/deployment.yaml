apiVersion: apps/v1
kind: Deployment
metadata:
  name: digicloset
spec:
  replicas: 3
  selector:
    matchLabels:
      app: digicloset
  template:
    metadata:
      labels:
        app: digicloset
    spec:
      containers:
        - name: digicloset
          image: digicloset:latest
          ports:
            - containerPort: 3000
