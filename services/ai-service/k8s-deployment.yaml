# ========================================
# Shopify Fashion Recommendation Engine
# Kubernetes Deployment Manifests
# ========================================

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: recommendation
  labels:
    app: recommendation-engine

---
# Persistent Volume Claim for index data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: recommendation-data
  namespace: recommendation
  labels:
    app: recommendation-engine
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard

---
# ConfigMap for environment configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: recommendation-config
  namespace: recommendation
  labels:
    app: recommendation-engine
data:
  CLIP_MODEL_NAME: "openai/clip-vit-base-patch32"
  EMBEDDING_DIM: "512"
  SERVICE_HOST: "0.0.0.0"
  SERVICE_PORT: "8000"
  NUM_WORKERS: "2"
  LOG_LEVEL: "info"
  COLOR_WEIGHT: "0.2"
  SIMILARITY_THRESHOLD: "0.3"
  CORS_ORIGINS: "*"
  INDEX_PATH: "/data/recommendation_index/faiss.index"
  METADATA_PATH: "/data/recommendation_index/metadata.json"

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-engine
  namespace: recommendation
  labels:
    app: recommendation-engine
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: recommendation-engine
  template:
    metadata:
      labels:
        app: recommendation-engine
        version: v1
    spec:
      terminationGracePeriodSeconds: 30
      
      containers:
      - name: recommendation-service
        image: shopify-recommendation-engine:latest
        imagePullPolicy: IfNotPresent
        
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        env:
        - name: SERVICE_PORT
          valueFrom:
            configMapKeyRef:
              name: recommendation-config
              key: SERVICE_PORT
        - name: NUM_WORKERS
          valueFrom:
            configMapKeyRef:
              name: recommendation-config
              key: NUM_WORKERS
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: recommendation-config
              key: LOG_LEVEL
        - name: CLIP_MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: recommendation-config
              key: CLIP_MODEL_NAME
        - name: COLOR_WEIGHT
          valueFrom:
            configMapKeyRef:
              name: recommendation-config
              key: COLOR_WEIGHT
        - name: INDEX_PATH
          valueFrom:
            configMapKeyRef:
              name: recommendation-config
              key: INDEX_PATH
        - name: METADATA_PATH
          valueFrom:
            configMapKeyRef:
              name: recommendation-config
              key: METADATA_PATH
        
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        
        volumeMounts:
        - name: index-data
          mountPath: /data
        
        # Liveness probe - restart if unhealthy
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 40
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe - remove from service if not ready
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Startup probe - wait for startup
        startupProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
      
      volumes:
      - name: index-data
        persistentVolumeClaim:
          claimName: recommendation-data

---
# Service - LoadBalancer
apiVersion: v1
kind: Service
metadata:
  name: recommendation-engine
  namespace: recommendation
  labels:
    app: recommendation-engine
spec:
  type: LoadBalancer
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: recommendation-engine

---
# Service - ClusterIP (for internal use)
apiVersion: v1
kind: Service
metadata:
  name: recommendation-engine-internal
  namespace: recommendation
  labels:
    app: recommendation-engine
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: recommendation-engine

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: recommendation-engine-hpa
  namespace: recommendation
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: recommendation-engine
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 50
        periodSeconds: 30
      - type: Pods
        value: 1
        periodSeconds: 30
      selectPolicy: Max

---
# NetworkPolicy - restrict traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: recommendation-engine-policy
  namespace: recommendation
spec:
  podSelector:
    matchLabels:
      app: recommendation-engine
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8000
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 443

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: recommendation-engine-pdb
  namespace: recommendation
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: recommendation-engine

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: recommendation-engine
  namespace: recommendation
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - recommendation.example.com
    secretName: recommendation-tls
  rules:
  - host: recommendation.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: recommendation-engine
            port:
              number: 8000
